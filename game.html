<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usdtcoins - Tap to Earn</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            padding: 20px;
            user-select: none;
        }
        .header {
            margin-bottom: 20px;
        }
        .score-container {
            font-size: 32px;
            font-weight: bold;
            color: #f39c12;
            margin: 10px 0;
        }
        /* تصميم زر الأرنب الخاص بالتكبيس */
        .rabbit-container {
            margin: 40px auto;
            width: 200px;
            height: 200px;
            position: relative;
        }
        .rabbit-btn {
            width: 100%;
            height: 100%;
            background-image: url('https://img.icons8.com/emoji/170/rabbit-face-emoji.png'); /* يمكنك تغيير رابط الصورة برابط أرنبك الخاص لاحقاً */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            background-color: transparent;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s ease;
        }
        .rabbit-btn:active {
            transform: scale(0.92);
        }
        /* أزرار وتنسيقات القوائم */
        .btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0077b3;
        }
        .btn-gold {
            background-color: #27ae60;
        }
        .btn-gold:hover {
            background-color: #219653;
        }
        .section {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border: 1px solid #333;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2b2b2b;
            color: white;
            text-align: center;
        }
        .timer-info {
            font-size: 14px;
            color: #ffcc00;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>عملة USDTCOINS 🚀</h1>
        <p>اضغط على الأرنب لتجميع الذهب وتحويله إلى عملات وبث الإعلانات!</p>
    </div>

    <div class="section">
        <div>الذهب الحالي: <span id="gold-count" class="score-container">0</span> 🪙</div>
        <div style="margin-top: 10px; color: #aaa;">رصيد عملتك المربوطة: <span id="coin-count" style="color: #0088cc; font-weight: bold;">0</span> Mp</div>
    </div>

    <div class="rabbit-container">
        <button class="rabbit-btn" onclick="tapRabbit()"></button>
    </div>

    <div class="section">
        <h3>مكافآت الإعلانات 🎁</h3>
        <button class="btn btn-gold" onclick="showRewardAd()">شاهد فيديو واربح 1000 ذهبة فوراً! 📺</button>
        <div class="timer-info">💡 ميزة التشغيل التلقائي مفعلة: سيظهر لك إعلان تلقائي كل 60 ثانية لزيادة أرباحك!</div>
    </div>

    <div class="section">
        <h3>محفظتك وسحب الأرباح 💳</h3>
        <input type="text" id="wallet-input" placeholder="أدخل عنوان محفظتك (TON / BSC)">
        <br>
        <button class="btn" onclick="saveWallet()">ربط المحفظة</button>
        <button class="btn" onclick="convertGoldToCoins()">تحويل الذهب لعملات</button>
    </div>

    <script>
        // تفعيل خصائص التلجرام ميني أب (التكبير وتجهيز التطبيق)
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // متغيرات اللعبة (حفظ البيانات محلياً في متصفح المستخدم)
        let gold = parseInt(localStorage.getItem('gold')) || 0;
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let wallet = localStorage.getItem('wallet') || "";

        // تحديث أرقام الواجهة فور فتح اللعبة
        document.getElementById('gold-count').innerText = gold;
        document.getElementById('coin-count').innerText = coins;
        document.getElementById('wallet-input').value = wallet;

        // دالة التكبيس على الأرنب وزيادة الذهب
        function tapRabbit() {
            gold += 1;
            updateUI();
        }

        // ربط وتهيئة إعلانات Adsgram بالمعرف الخاص بك
        const AdController = window.Adsgram.init({ blockId: "Int-31442" });

        // دالة تشغيل الإعلان بمكافأة الـ 1000 ذهبة
        function showRewardAd() {
            AdController.show()
                .then((result) => {
                    // الكود الذي يتنفذ عندما يشاهد اللاعب الإعلان كاملاً
                    gold += 1000;
                    updateUI();
                    alert("كفو! شاهدت الإعلان كاملاً وتمت إضافة 1000 ذهبة إلى رصيدك! 💰");
                })
                .catch((result) => {
                    // الكود الذي يتنفذ في حال حصول خطأ أو إغلاق الإعلان مبكراً
                    console.log("Ad status or skipped:", result);
                });
        }

        // 🚀 كود ميزة الإعلانات التلقائية كل دقيقة (60,000 مللي ثانية)
        setInterval(() => {
            console.log("حان وقت الإعلان التلقائي...");
            AdController.show()
                .then((result) => {
                    // نكافئ اللاعب بـ 1000 ذهبة أيضاً عند مشاهدة الإعلان التلقائي لكي لا يغضب من تكرار الإعلانات
                    gold += 1000;
                    updateUI();
                })
                .catch((result) => {
                    console.log("تم تخطي الإعلان التلقائي أو حدث خطأ:", result);
                });
        }, 60000); // 60000 مللي ثانية = دقيقة واحدة تماماً

        // حفظ عنوان المحفظة محلياً
        function saveWallet() {
            const walletValue = document.getElementById('wallet-input').value;
            if(walletValue.trim() !== "") {
                localStorage.setItem('wallet', walletValue);
                alert("تم ربط محفظتك بنجاح! 🔒");
            } else {
                alert("الرجاء إدخال عنوان محفظة صحيح.");
            }
        }

        // تحويل الذهب لعملات (كل 5000 ذهبة تعادل 1 عملة Mp)
        function convertGoldToCoins() {
            if (gold >= 5000) {
                let newCoins = Math.floor(gold / 5000);
                coins += newCoins;
                gold = gold % 5000; // الإبقاء على باقي الذهب الذي لم يُحّول
                updateUI();
                alert(`تم بنجاح تحويل الذهب! حصلت على ${newCoins} عملة جديدة من Mp. 🎉`);
            } else {
                alert("عذراً، يجب أن تملك 5000 ذهبة على الأقل لإجراء التحويل.");
            }
        }

        // دالة لتحديث الأرقام على الشاشة وحفظ التغييرات أولاً بأول
        function updateUI() {
            document.getElementById('gold-count').innerText = gold;
            document.getElementById('coin-count').innerText = coins;
            localStorage.setItem('gold', gold);
            localStorage.setItem('coins', coins);
        }
    </script>

</body>
</html>
